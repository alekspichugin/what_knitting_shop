name: Deploy to Firebase Hosting

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Build client app
        working-directory: shop
        run: flutter build web --wasm

      - name: Save client build
        run: cp -r shop/build/web shop/build/client

      - name: Build admin app
        working-directory: shop
        run: flutter build web --wasm --target lib/main_admin.dart --base-href /admin/

      - name: Merge admin into client
        run: |
          mkdir -p shop/build/client/admin
          cp -r shop/build/web/* shop/build/client/admin/
          rm -rf shop/build/web
          mv shop/build/client shop/build/web

      - name: Deploy to Firebase Hosting
        run: |
          npm install -g firebase-tools
          firebase deploy --only hosting --token "${{ secrets.FIREBASE_TOKEN }}"
